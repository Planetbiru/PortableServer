<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Emoji to PNG (32x32)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        canvas {
            border: 1px solid #ccc;
            margin-top: 10px;
        }

        input {
            font-size: 24px;
            width: 80px;
            text-align: center;
        }
    </style>
</head>

<body>

    <h2>Emoji → PNG (32x32)</h2>

    <input type="text" id="emojiInput" value="▶️">
    <button onclick="generate()">Generate</button>
    <button onclick="downloadPNG()">Download PNG</button>

    <br>
    <canvas id="canvas" width="32" height="32"></canvas>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        // Generate emoji ke canvas (via SVG agar selalu berwarna)
        function generate() {
            let emoji = document.getElementById("emojiInput").value;

            // paksa emoji mode (warna)
            emoji += "\uFE0F";

            const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32">
        <text x="50%" y="58%"
              font-size="28"
              text-anchor="middle"
              dominant-baseline="middle"
              font-family="Segoe UI Emoji, Apple Color Emoji, Noto Color Emoji, sans-serif">
            ${emoji}
        </text>
    </svg>`;

            const img = new Image();

            img.onload = function () {
                ctx.clearRect(0, 0, 32, 32);
                ctx.drawImage(img, 0, 0, 32, 32);
            };

            img.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
        }

        // Download PNG
        function downloadPNG() {
            const link = document.createElement("a");
            link.download = "emoji.png";
            link.href = canvas.toDataURL("image/png");
            link.click();
        }

        // Auto generate saat pertama load
        generate();
    </script>

</body>

</html>
